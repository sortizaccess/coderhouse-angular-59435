<div class="container"> 
    <section>
         <button mat-flat-button (click)="openModal()"><mat-icon>add</mat-icon> Crear</button>
    </section>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 my-3">

        <ng-container matColumnDef="legajo">
          <th mat-header-cell *matHeaderCellDef> <strong>Legajo</strong> </th>
          <td mat-cell *matCellDef="let alumno"> {{alumno.legajo}} </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef> <strong>Nombre Completo</strong> </th>
            <td mat-cell *matCellDef="let alumno"> {{ {nombre: alumno.nombre, apellido: alumno.apellido} | nombreCompleto}} </td>
        </ng-container>

        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> <strong>Email</strong> </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.email}} </td>
        </ng-container>        

        <ng-container matColumnDef="fechaNacimiento">
            <th mat-header-cell *matHeaderCellDef> <strong>Fecha de Nacimiento</strong> </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.fechaNacimiento | date}} </td>
        </ng-container>

        <ng-container matColumnDef="genero">
            <th mat-header-cell *matHeaderCellDef> <strong>Género</strong> </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.genero}} </td>
        </ng-container>
  
        <ng-container matColumnDef="acciones">
            <th class="text-center" mat-header-cell *matHeaderCellDef> <strong>Acciones</strong> </th>
            <td mat-cell *matCellDef="let alumno" class="text-center"> 
                <a (click)="openModal(alumno)">
                    <button mat-mini-fab aria-label="Modificar" class="mx-1 shadow-none">
                        <mat-icon>edit</mat-icon>
                    </button>
                </a> 
                <a (click)="eliminarAlumno(alumno)">
                    <button color="danger" mat-mini-fab aria-label="Eliminar" class="mx-1 shadow-none">
                        <mat-icon>delete</mat-icon>
                    </button>
                </a>
            </td>
        </ng-container>       

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>           
</div>

<app-toasts></app-toasts>
