<div class="container">
    
    <section class="pb-3">
         <button mat-flat-button><mat-icon>add</mat-icon> Crear</button>
    </section>
    
    
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="legajo">
          <th mat-header-cell *matHeaderCellDef> Legajo </th>
          <td mat-cell *matCellDef="let alumno"> {{alumno.legajo}} </td>
        </ng-container>

        <ng-container matColumnDef="fechaInscripcion">
            <th mat-header-cell *matHeaderCellDef> Fecha de Inscripción </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.fechaInscripcion | date}} </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.nombre}} </td>
        </ng-container>

        <ng-container matColumnDef="apellido">
            <th mat-header-cell *matHeaderCellDef> Apellido </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.apellido}} </td>
        </ng-container>

        <!-- <ng-container matColumnDef="fechaNacimiento">
            <th mat-header-cell *matHeaderCellDef> Fecha de Nacimiento </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.fechaNacimiento}} </td>
        </ng-container> -->

        <ng-container matColumnDef="genero">
            <th mat-header-cell *matHeaderCellDef> Genero </th>
            <td mat-cell *matCellDef="let alumno"> {{alumno.genero}} </td>
        </ng-container>
  
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let row"> 
                <a><mat-icon>edit</mat-icon></a> 
                <a (click)="eliminarAlumno(row)"><mat-icon>delete</mat-icon></a>
            </td>
        </ng-container>       

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>           
</div>

<app-toasts></app-toasts>
